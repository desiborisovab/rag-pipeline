# config.yml — single source of truth for all pipeline parameters
embedding:
  model_id: "BAAI/bge-large-en-v1.5"
  dimension: 1024
  batch_size: 16
  query_prefix: "Represent this sentence for searching relevant passages: "

generation:
  model_id: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  max_new_tokens: 512
  temperature: 0.2

chunking:
  strategy: "fixed"
  chunk_size: 500
  chunk_overlap: 100

retrieval:
  candidate_k: 20
  top_k: 5

reranker:
  enabled: true
  model_id: "cross-encoder/ms-marco-MiniLM-L-6-v2"

vector_store:
  index_path: "/app/index/faiss.index"
  store_path: "/app/index/chunks.pkl"

mlflow:
  experiment_name: "rag-pipeline"
  tracking_uri: null

serving:
  host: "0.0.0.0"
  port: 8000

evaluation:
  dataset_path: "evaluation/eval_dataset.json"